# Dependabot configuration for Wi-Fi Roam Watcher
#
# This repository is mainly PowerShell, so Dependabot is used here
# to keep GitHub Actions versions up to date.

version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "09:00"
      timezone: "Europe/Malta"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore"
      include: "scope"
